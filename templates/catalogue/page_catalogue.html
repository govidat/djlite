{% extends "base.html" %}
{% load my_tags %}

{% block content %}
<div class="flex min-h-screen bg-base-100">

  <!-- ── Filter Sidebar ─────────────────────────────────────── -->
  <aside class="w-64 shrink-0 border-r border-base-300 p-4 hidden lg:block">
    {% include "catalogue/partials/filter_sidebar.html" %}
  </aside>

  <!-- ── Main Content ───────────────────────────────────────── -->
  <main class="flex-1 p-4 lg:p-6">

    <!-- Search bar -->
    <div class="mb-6">
      <form hx-get="{% url 'catalogue_filter' client_id=client.client_id %}"
            hx-target="#items-container"
            hx-swap="innerHTML"
            hx-trigger="submit, input delay:500ms from:#search-input"
            class="flex gap-2">
        <input id="search-input"
               type="text"
               name="q"
               value="{{ catalogue.filters.search|default:'' }}"
               placeholder="Search items..."
               class="input input-bordered flex-1">
        <button type="submit" class="btn btn-primary">Search</button>
      </form>
    </div>

    <!-- Items container — HTMX target -->
    <div id="items-container">
      {% include "catalogue/partials/items_list.html" %}
    </div>

  </main>
</div>
{% endblock %}
