<!-- ============================================================
FILE: templates/catalogue/partials/item_card.html
Single item card — used in grid view.
Phase 3: add "Add to Cart" button here.
============================================================ -->
{% comment %}
  Input: item — serialised item dict from _serialize_item()
{% endcomment %}

<div class="card bg-base-100 border border-base-300 hover:shadow-md
            transition-shadow duration-200 cursor-pointer group">

  <!-- Image -->
  <a href="{% url 'item_detail' client_id=client.client_id item_id=item.item_id %}">
    <figure class="aspect-square overflow-hidden bg-base-200 rounded-t-2xl">
      {% if item.image_url %}
        <img src="{{ item.image_url }}"
             alt="{{ item.image_alt|default:item.name }}"
             class="w-full h-full object-cover
                    group-hover:scale-105 transition-transform duration-300"
             loading="lazy">
      {% else %}
        <div class="w-full h-full flex items-center justify-center
                    text-base-content/30 text-4xl">
          📦
        </div>
      {% endif %}
    </figure>
  </a>

  <div class="card-body p-4">

    <!-- Name -->
    <a href="{% url 'item_detail' client_id=client.client_id item_id=item.item_id %}"
       class="card-title text-sm font-semibold text-base-content
              hover:text-primary line-clamp-2">
      {{ item.name }}
    </a>

    <!-- SKU -->
    {% if item.sku %}
    <p class="text-xs text-base-content/40 font-mono">{{ item.sku }}</p>
    {% endif %}

    <!-- Price (Phase 3: replace with proper price model) -->
    {% if item.price %}
    <p class="text-lg font-bold text-primary">
      {{ item.currency }} {{ item.price }}
    </p>
    {% endif %}

    <!-- Phase 3: Add to Cart button placeholder -->
    <div class="card-actions justify-end mt-2">
      <a href="{% url 'item_detail' client_id=client.client_id item_id=item.item_id %}"
         class="btn btn-primary btn-sm w-full">
        View Details
      </a>
      {# Phase 3: replace with:
      <button class="btn btn-primary btn-sm w-full"
              hx-post="{% url 'cart_add' client_id=client.client_id item_id=item.item_id %}"
              hx-target="#cart-count"
              hx-swap="innerHTML">
        Add to Cart
      </button>
      #}
    </div>

  </div>
</div>
