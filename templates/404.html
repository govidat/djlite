{% load cotton %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found{% if client %} — {{ client.client_id }}{% endif %}</title>
    {% if theme %}
    <style>
        :root {
            --color-primary: {{ theme.primary }};
            --color-base-100: {{ theme.base_100 }};
            --color-base-content: {{ theme.base_content }};
        }
    </style>
    {% endif %}
</head>
<body class="min-h-screen flex items-center justify-center bg-base-100 text-base-content">
    <div class="text-center p-8">
        <h1 class="text-6xl font-bold text-primary mb-4">404</h1>
        <h2 class="text-2xl font-semibold mb-4">Page Not Found</h2>
        <p class="text-base-content/70 mb-8">
            The page you're looking for doesn't exist or has been removed.
        </p>
        {% if client %}
            <a href="/{{ client.client_id }}/"
               class="btn btn-primary">
                Back to Home
            </a>
        {% else %}
            <a href="/" class="btn btn-primary">Back to Home</a>
        {% endif %}
    </div>
</body>
</html>
